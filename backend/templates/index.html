<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Diamond Price Prediction | Machine Learning</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- Background Circles -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="container">

        <div class="header">

            <div class="diamond">

                <i class="fa-solid fa-gem"></i>

            </div>

            <h1>Diamond Price Prediction</h1>

            <p>
                Predict the market value of a diamond using a trained Machine Learning model.
            </p>

        </div>

        <form id="predictForm">

            <div class="input-group">

                <label>Carat</label>

                <input
                    type="number"
                    step="0.01"
                    id="carat"
                    placeholder="Example : 1.25"
                    required>

            </div>

            <div class="input-group">

                <label>Cut</label>

                <select id="cut"></select>

            </div>

            <div class="input-group">

                <label>Color</label>

                <select id="color"></select>

            </div>

            <div class="input-group">

                <label>Clarity</label>

                <select id="clarity"></select>

            </div>

            <div class="row">

                <div class="input-group">

                    <label>Depth</label>

                    <input
                        type="number"
                        step="0.1"
                        id="depth"
                        placeholder="Depth"
                        required>

                </div>

                <div class="input-group">

                    <label>Table</label>

                    <input
                        type="number"
                        step="0.1"
                        id="table"
                        placeholder="Table"
                        required>

                </div>

            </div>

            <div class="row">

                <div class="input-group">

                    <label>Length (X)</label>

                    <input
                        type="number"
                        step="0.01"
                        id="x"
                        placeholder="mm"
                        required>

                </div>

                <div class="input-group">

                    <label>Width (Y)</label>

                    <input
                        type="number"
                        step="0.01"
                        id="y"
                        placeholder="mm"
                        required>

                </div>

                <div class="input-group">

                    <label>Height (Z)</label>

                    <input
                        type="number"
                        step="0.01"
                        id="z"
                        placeholder="mm"
                        required>

                </div>

            </div>

            <button id="predictBtn" type="submit">

                <i class="fa-solid fa-wand-magic-sparkles"></i>

                Predict Price

            </button>

        </form>

        <div id="result"></div>

        <footer>

            <p>

                <i class="fa-solid fa-brain"></i>

                Powered by Machine Learning |

                HTML • CSS • JavaScript • Flask

            </p>

        </footer>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
